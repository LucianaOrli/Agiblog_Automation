name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Isso remove o aviso de obsolescência

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-bdd pytest-playwright pytest-html
          playwright install --with-deps chromium

      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/tests
          pytest --html=report.html --self-contained-html
        continue-on-error: true # Permite gerar o relatório mesmo se o teste falhar

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html
